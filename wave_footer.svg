<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 160" width="1440" height="160" preserveAspectRatio="none">
  <defs>
    <linearGradient id="wg1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#0D1117" />
      <stop offset="50%"  stop-color="#A371F7" stop-opacity="0.6" />
      <stop offset="100%" stop-color="#58A6FF" />
    </linearGradient>
    <linearGradient id="wg2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#58A6FF" stop-opacity="0.4"/>
      <stop offset="50%"  stop-color="#A371F7" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#0D1117" />
    </linearGradient>
    <linearGradient id="wg3" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#A371F7" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#3FB950" stop-opacity="0.2"/>
    </linearGradient>
  </defs>

  <rect width="1440" height="160" fill="#0D1117"/>

  <!-- Wave layer 3 — slowest, back -->
  <path fill="url(#wg3)" opacity="0.5"
    d="M0,80 C180,40 360,120 540,80 C720,40 900,120 1080,80 C1260,40 1440,100 1440,80 L1440,160 L0,160 Z">
    <animateTransform attributeName="transform" type="translate"
      values="0,0; -360,0; 0,0" dur="9s" repeatCount="indefinite" />
  </path>

  <!-- Wave layer 2 — medium speed -->
  <path fill="url(#wg2)" opacity="0.6"
    d="M0,100 C120,60 240,130 360,95 C480,60 600,130 720,95 C840,60 960,130 1080,95 C1200,60 1320,130 1440,95 L1440,160 L0,160 Z">
    <animateTransform attributeName="transform" type="translate"
      values="0,0; -480,0; 0,0" dur="6s" repeatCount="indefinite" />
  </path>

  <!-- Wave layer 1 — fastest, front -->
  <path fill="url(#wg1)" opacity="0.85"
    d="M0,110 C90,80 180,140 270,110 C360,80 450,140 540,110 C630,80 720,140 810,110 C900,80 990,140 1080,110 C1170,80 1260,140 1350,110 C1395,95 1420,100 1440,110 L1440,160 L0,160 Z">
    <animateTransform attributeName="transform" type="translate"
      values="0,0; -270,0; 0,0" dur="4s" repeatCount="indefinite" />
  </path>

  <!-- Shimmer dots floating up -->
  <circle cx="200" cy="105" r="2" fill="#A371F7" opacity="0">
    <animate attributeName="cy" values="120;60;120" dur="4s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;0.8;0" dur="4s" repeatCount="indefinite"/>
  </circle>
  <circle cx="500" cy="95" r="1.5" fill="#58A6FF" opacity="0">
    <animate attributeName="cy" values="130;55;130" dur="5.5s" begin="1s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;0.7;0" dur="5.5s" begin="1s" repeatCount="indefinite"/>
  </circle>
  <circle cx="800" cy="100" r="2.5" fill="#3FB950" opacity="0">
    <animate attributeName="cy" values="125;50;125" dur="3.8s" begin="0.5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;0.6;0" dur="3.8s" begin="0.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="1100" cy="110" r="2" fill="#A371F7" opacity="0">
    <animate attributeName="cy" values="120;65;120" dur="4.5s" begin="2s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;0.75;0" dur="4.5s" begin="2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="1300" cy="100" r="1.5" fill="#FFA657" opacity="0">
    <animate attributeName="cy" values="115;55;115" dur="5s" begin="1.5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;0.65;0" dur="5s" begin="1.5s" repeatCount="indefinite"/>
  </circle>
</svg>
