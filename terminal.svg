<svg width="860" height="640" viewBox="0 0 860 640" fill="none" xmlns="http://www.w3.org/2000/svg">
  <foreignObject width="860" height="640">
    <div xmlns="http://www.w3.org/1999/xhtml">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
.term {
  width:860px; height:640px;
  background:#0D1117;
  border:1.5px solid #30363D;
  border-radius:12px;
  font-family:'Courier New',Courier,monospace;
  font-size:13px;
  overflow:hidden;
}
.bar {
  background:#161B22;
  height:44px;
  display:flex;
  align-items:center;
  padding:0 16px;
  border-bottom:1px solid #30363D;
  position:relative;
}
.dots { display:flex; gap:8px; }
.dot  { width:13px; height:13px; border-radius:50%; }
.r    { background:#FF5F57; }
.y    { background:#FEBC2E; }
.g    { background:#28C840; }
.ttl  {
  position:absolute; left:0; right:0;
  text-align:center; color:#8B949E;
  font-size:12px; pointer-events:none;
}
.body { padding:16px 26px; line-height:1.7; }
p { margin:1px 0; }
.gap { margin-top:11px; }
.sm  { margin-top:2px; }

/* Color palette */
.pu { color:#A371F7; }
.bl { color:#58A6FF; }
.sy { color:#E6EDF3; }
.gn { color:#7EE787; }
.yl { color:#E3B341; }
.cy { color:#39C5BA; }
.gr { color:#8B949E; }
.wh { color:#E6EDF3; }
.ky { color:#79C0FF; }
.ok { color:#3FB950; }
.dm { color:#484F58; }
.bt { color:#58A6FF; }

/* Typing spans */
.ty {
  display:inline-block;
  overflow:hidden;
  white-space:nowrap;
  vertical-align:bottom;
  width:0;
}

/* Keyframes */
@keyframes fi    { from{opacity:0} to{opacity:1} }
@keyframes t6    { to{width:6ch}  }
@keyframes t16   { to{width:16ch} }
@keyframes t22   { to{width:22ch} }
@keyframes t18   { to{width:18ch} }
@keyframes blink { 0%,49%{opacity:1} 50%,100%{opacity:0} }

/* Cursor */
.cur { color:#3FB950; opacity:0; animation:blink 1s 9.1s linear infinite; }

/* Hidden base */
.ln { opacity:0; }

/* ── Boot lines ── */
.a01 { animation:fi 0.3s 0.3s forwards; }
.a02 { animation:fi 0.3s 0.8s forwards; }
.a03 { animation:fi 0.3s 1.2s forwards; }
.a04 { animation:fi 0.3s 1.5s forwards; }

/* ── whoami ── */
.a05 { animation:fi 0.01s 2.1s forwards; }
.t05 { animation:t6  0.2s steps(6,end)  2.11s forwards; }
.a06 { animation:fi  0.3s               2.5s  forwards; }
.a07 { animation:fi  0.3s               2.8s  forwards; }
.a08 { animation:fi  0.3s               3.1s  forwards; }

/* ── cat stack.config ── */
.a09 { animation:fi 0.01s 3.7s forwards; }
.t09 { animation:t16 0.5s steps(16,end) 3.71s forwards; }
.a10 { animation:fi  0.3s               4.3s  forwards; }
.a11 { animation:fi  0.3s               4.6s  forwards; }
.a12 { animation:fi  0.3s               4.9s  forwards; }
.a13 { animation:fi  0.3s               5.2s  forwards; }

/* ── ls ~/projects ── */
.a14 { animation:fi 0.01s 5.8s forwards; }
.t14 { animation:t22 0.7s steps(22,end) 5.81s forwards; }
.a15 { animation:fi  0.3s               6.6s  forwards; }
.a16 { animation:fi  0.3s               6.8s  forwards; }

/* ── ./status ── */
.a17 { animation:fi 0.01s 7.3s forwards; }
.t17 { animation:t18 0.5s steps(18,end) 7.31s forwards; }
.a18 { animation:fi  0.3s               7.9s  forwards; }
.a19 { animation:fi  0.3s               8.2s  forwards; }
.a20 { animation:fi  0.3s               8.5s  forwards; }

/* ── cursor prompt ── */
.a21 { animation:fi 0.01s 9.0s forwards; }
</style>

<div class="term">
  <div class="bar">
    <div class="dots">
      <div class="dot r"></div>
      <div class="dot y"></div>
      <div class="dot g"></div>
    </div>
    <span class="ttl">priyanshu@orbit: ~/agentic-ai</span>
  </div>

  <div class="body">

    <!-- BOOT -->
    <p class="ln a01"><span class="dm"># ──────────────────────────────────────────────────────────── #</span></p>
    <p class="ln a02 sm"><span class="bt">&gt; </span><span class="gr">initializing </span><span class="pu">priyanshu</span><span class="gr">.dev</span><span class="dm">...</span></p>
    <p class="ln a03 sm"><span class="bt">&gt; </span><span class="gr">loading stack modules</span><span class="dm">...</span></p>
    <p class="ln a04 sm"><span class="ok">✓ </span><span class="wh">profile loaded</span><span class="dm"> — welcome to the lab</span></p>
    <p class="ln a04 sm"><span class="dm"># ──────────────────────────────────────────────────────────── #</span></p>

    <!-- WHOAMI -->
    <p class="ln a05 gap">
      <span class="pu">priyanshu</span><span class="sy">@</span><span class="bl">orbit</span><span class="sy">:</span><span class="bl">~</span><span class="sy">$ </span><span class="gn ty t05">whoami</span>
    </p>
    <p class="ln a06 sm"><span class="pu">  ╰─ </span><span class="wh">Agentic AI Dev Intern </span><span class="dm">·</span><span class="cy"> Data Legos</span><span class="dm">  ·  </span><span class="wh">Final Year CS</span><span class="dm"> · </span><span class="cy">BIT Bhopal</span></p>
    <p class="ln a07 sm"><span class="pu">  ╰─ </span><span class="ok">Python AI Engineer</span><span class="dm">  ·  </span><span class="yl">"Depth &gt; Breadth. Architecture &gt; Frameworks."</span></p>
    <p class="ln a08 sm"><span class="pu">  ╰─ </span><span class="wh">Chai aur Code ☕ organizer</span><span class="dm">  ·  </span><span class="gr">DSA · Dev · Cloud · Applied AI</span></p>

    <!-- STACK -->
    <p class="ln a09 gap">
      <span class="pu">priyanshu</span><span class="sy">@</span><span class="bl">orbit</span><span class="sy">:</span><span class="bl">~</span><span class="sy">$ </span><span class="gn ty t09">cat stack.config</span>
    </p>
    <p class="ln a10 sm"><span class="ky">  [ AI ]   </span><span class="wh">Python · LangGraph · Groq · Ollama · Anthropic</span></p>
    <p class="ln a11 sm"><span class="ky">  [ API ]  </span><span class="wh">FastAPI · Pydantic · A2A Protocol · MCP Servers</span></p>
    <p class="ln a12 sm"><span class="ky">  [ DB ]   </span><span class="wh">Neo4j · ChromaDB · Redis · PostgreSQL</span></p>
    <p class="ln a13 sm"><span class="ky">  [ OPS ]  </span><span class="wh">Docker · LangSmith · OpenTelemetry · GitHub Actions</span></p>

    <!-- PROJECTS -->
    <p class="ln a14 gap">
      <span class="pu">priyanshu</span><span class="sy">@</span><span class="bl">orbit</span><span class="sy">:</span><span class="bl">~</span><span class="sy">$ </span><span class="gn ty t14">ls ~/projects --detail</span>
    </p>
    <p class="ln a15 sm">
      <span class="cy">  LexRAG/    </span><span class="ok">Elixir/    </span><span class="yl">ORBIT/    </span><span class="pu">GraphRAG/</span>
    </p>
    <p class="ln a16 sm"><span class="dm">  # legal-rag  medical-ai  cybersec-intel  hybrid-rag</span></p>

    <!-- STATUS -->
    <p class="ln a17 gap">
      <span class="pu">priyanshu</span><span class="sy">@</span><span class="bl">orbit</span><span class="sy">:</span><span class="bl">~</span><span class="sy">$ </span><span class="gn ty t17">./status --current</span>
    </p>
    <p class="ln a18 sm"><span class="ok">  [✓] </span><span class="wh">ORBIT pipeline    </span><span class="dm">──</span><span class="ok"> ACTIVE @ DATA LEGOS</span></p>
    <p class="ln a19 sm"><span class="ok">  [✓] </span><span class="wh">LexRAG + Elixir   </span><span class="dm">──</span><span class="cy"> PORTFOLIO READY</span></p>
    <p class="ln a20 sm"><span class="yl">  [⟳] </span><span class="wh">Striver A2Z DSA   </span><span class="dm">──</span><span class="yl"> IN PROGRESS</span></p>

    <!-- CURSOR -->
    <p class="ln a21 gap">
      <span class="pu">priyanshu</span><span class="sy">@</span><span class="bl">orbit</span><span class="sy">:</span><span class="bl">~</span><span class="sy">$ </span><span class="cur">█</span>
    </p>
    <p class="ln a21 sm"><span class="dm"># ──────────────────────────────────────────────────────────── #</span></p>

  </div>
</div>
    </div>
  </foreignObject>
</svg>
